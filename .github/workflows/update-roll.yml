name: Update Blogroll Feed

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  workflow_dispatch:      # Allows manual execution from the GitHub Actions tab

permissions:
  contents: write         # Allows the job to push commits to the repository

jobs:
  update-blogroll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run RSS updater script
        run: uv run update_blogroll.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/blogroll.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in blogroll data."
          else
            git commit -m "chore: update blogroll feeds [skip ci]"
            git push
          fi
