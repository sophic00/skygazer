# The URL the site will be built for
base_url = "https://www.sophic.dev"

# Used for feed
title = "sophic00"
description = "My small place on internet."
default_language = "en"
author = "Vaibhav Sijaria"

taxonomies = [
    { name = "tags", feed = true }
]

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# When set to "true", the generated HTML files are minified.
minify_html = true

# When set to "true", a feed is automatically generated.
generate_feeds = true

# When set to "false", Sitemap.xml is not generated
generate_sitemap = true

# When set to "false", robots.txt is not generated
generate_robots_txt = true

[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = false
external_links_external = true
lazy_async_image = true
github_alerts = true
# insert_anchor_links = "left"
# Whether footnotes are rendered in the GitHub-style (at the bottom, with back references) or plain (in the place, where they are defined)
bottom_footnotes = true
[markdown.highlighting]
error_on_missing_language = true
theme = "catppuccin-mocha"

[extra]
date_format = "%d %b, %Y"
favicon = "/favicon.svg"
webserver_sends_csp_headers = false

umami_website_id = "6bb4ab71-9eb0-469c-b307-112ccefa8e89"
umami_script_url = "https://analytics.sophic.dev/telemetry"
umami_domains = "www.sophic.dev,sophic.dev"

[extra.table_of_contents]
show = false
max_level = 6
visible_on_load = true

[[extra.main_menu]]
name = "/home"
url = "@/_index.md"

[[extra.main_menu]]
name = "/posts"
url = "@/posts/_index.md"

[[extra.main_menu]]
name = "/roll"
url = "@/roll.md"

