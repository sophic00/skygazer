<header>
  <a href="{{ get_url(path="@/_index.md") }}" class="title">
    <p>{{ config.title }}</p>
  </a>
  <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('header').classList.toggle('menu-open')">
    <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
    <svg class="close-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
    </svg>
  </button>
  <nav aria-label="Navigation">
    {%- include "nav.html" %}
  </nav>
</header>
