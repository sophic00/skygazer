{% import "macros.html" as macros %}
{% extends "base.html" %}

{%- block main -%}
  <main>
    {%- if term %}
      <h3 class="filter">Filtering for "{{ term.name }}"</h3>
      <small>
        <a href="{{ get_url(path="@/posts/_index.md") }}">Remove filter</a>
      </small>
    {%- endif %}
    {{ macros::post_list(pages=term.pages) }}
  </main>
{%- endblock -%}
